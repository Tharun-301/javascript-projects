<!DOCTYPE html>
<html>
  <head>
    <title>Coin Flip Game</title>
    <link rel="stylesheet" href="coin-flip.css">
  </head>

  <body>
    <div class="container">
      <h1 class="title">🪙 Coin Flip Game</h1>

      <div class="buttons">
        <button class="flip-button js-heads-button">Heads</button>
        <button class="flip-button js-tails-button">Tails</button>
      </div>

      <p class="result js-result"></p>
      <p class="js-moves"></p>
      <p class="score js-score"></p>

      <button class="reset-button js-reset-button">Reset Score</button>
    </div>

    <script src="coin-flip.js"></script>
  </body>
</html>
